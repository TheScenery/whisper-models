name: Download Whisper Models

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 1 * *'

permissions:
  contents: write

concurrency:
  group: whisper-models
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        run: |
          REPO="${{ github.repository }}"
          gh release view latest --repo "$REPO" > /dev/null 2>&1 || \
            gh release create latest \
              --repo "$REPO" \
              --title "Whisper Models" \
              --notes "Pre-downloaded OpenAI Whisper model files for reliable access.\n\nUpdated on $(date -u '+%Y-%m-%d').\n\nUse these files with \`whisper --model <name>\` by placing them in \`~/.cache/whisper/\`."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  download:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - tiny.en
          - tiny
          - base.en
          - base
          - small.en
          - small
          - medium.en
          - medium
          - large-v1
          - large-v2
          - large-v3
          - large-v3-turbo
    steps:
      - name: Download ${{ matrix.model }}
        id: download
        run: |
          MODEL="${{ matrix.model }}"
          case "$MODEL" in
            tiny.en)        SHA256="d3dd57d32accea0b295c96e26691aa14d8822fac7d9d27d5dc00b4ca2826dd03" ;;
            tiny)           SHA256="65147644a518d12f04e32d6f3b26facc3f8dd46e5390956a9424a650c0ce22b9" ;;
            base.en)        SHA256="25a8566e1d0c1e2231d1c762132cd20e0f96a85d16145c3a00adf5d1ac670ead" ;;
            base)           SHA256="ed3a0b6b1c0edf879ad9b11b1af5a0e6ab5db9205f891f668f8b0e6c6326e34e" ;;
            small.en)       SHA256="f953ad0fd29cacd07d5a9eda5624af0f6bcf2258be67c92b79389873d91e0872" ;;
            small)          SHA256="9ecf779972d90ba49c06d968637d720dd632c55bbf19d441fb42bf17a411e794" ;;
            medium.en)      SHA256="d7440d1dc186f76616474e0ff0b3b6b879abc9d1a4926b7adfa41db2d497ab4f" ;;
            medium)         SHA256="345ae4da62f9b3d59415adc60127b97c714f32e89e936602e85993674d08dcb1" ;;
            large-v1)       SHA256="e4b87e7e0bf463eb8e6956e646f1e277e901512310def2c24bf0e11bd3c28e9a" ;;
            large-v2)       SHA256="81f7c96c852ee8fc832187b0132e569d6c3065a3252ed18e56effd0b6a73e524" ;;
            large-v3)       SHA256="e5b1a55b89c1367dacf97e3e19bfd829a01529dbfdeefa8caeb59b3f1b81dadb" ;;
            large-v3-turbo) SHA256="aff26ae408abcba5fbf8813c21e62b0941638c5f6eebfb145be0c9839262a19a" ;;
            *) echo "Unknown model: $MODEL"; exit 1 ;;
          esac
          URL="https://openaipublic.azureedge.net/main/whisper/models/${SHA256}/${MODEL}.pt"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Downloading $MODEL..."
          curl -fSL --retry 3 --retry-delay 5 -o "${MODEL}.pt" "$URL"

      - name: Verify SHA256
        run: |
          EXPECTED="${{ steps.download.outputs.sha256 }}"
          ACTUAL=$(sha256sum "${{ matrix.model }}.pt" | cut -d' ' -f1)
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "SHA256 mismatch for ${{ matrix.model }}"
            echo "  Expected: $EXPECTED"
            echo "  Actual:   $ACTUAL"
            exit 1
          fi
          echo "SHA256 verified: $ACTUAL"

      - name: Upload to release
        run: |
          gh release upload latest "${{ matrix.model }}.pt" \
            --repo "${{ github.repository }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: download
    runs-on: ubuntu-latest
    steps:
      - name: Print release URL
        run: |
          echo ""
          echo "=========================================="
          echo " All models uploaded successfully!        "
          echo " Release: https://github.com/${{ github.repository }}/releases/tag/latest"
          echo "=========================================="
          echo ""
          echo "Usage:"
          echo "  curl -L -o ~/.cache/whisper/<model>.pt \\"
          echo "    https://github.com/${{ github.repository }}/releases/download/latest/<model>.pt"
