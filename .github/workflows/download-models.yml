name: Upload Whisper Models to Hugging Face

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 1 * *'

env:
  HF_REPO_ID: TheScenery/whisper-models

jobs:
  create-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install huggingface-hub
      - name: Create HF repo if not exists
        run: |
          python -c "
from huggingface_hub import HfApi
api = HfApi(token='${{ secrets.HF_TOKEN }}')
api.create_repo('${{ env.HF_REPO_ID }}', repo_type='model', exist_ok=True)
print('Repo ready')
"
      - name: Add HF repo card
        run: |
          python -c "
from huggingface_hub import HfApi
api = HfApi(token='${{ secrets.HF_TOKEN }}')
content = '''---
license: mit
library_name: whisper
---

# Whisper Models

Pre-downloaded OpenAI Whisper model files. Auto-updated via GitHub Actions.

## Usage

\`\`\`bash
huggingface-cli download TheScenery/whisper-models tiny.pt --local-dir ~/.cache/whisper/
\`\`\`
'''
api.upload_file(
  path_or_fileobj=content.encode(),
  path_in_repo='README.md',
  repo_id='${{ env.HF_REPO_ID }}',
  token='${{ secrets.HF_TOKEN }}',
)
print('README.md uploaded')
"

  upload:
    needs: create-repo
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - tiny.en
          - tiny
          - base.en
          - base
          - small.en
          - small
          - medium.en
          - medium
          - large-v1
          - large-v2
          - large-v3
          - large-v3-turbo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install huggingface-hub

      - name: Download and upload ${{ matrix.model }}
        run: python scripts/upload_model.py ${{ matrix.model }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  summary:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - name: Print result
        run: |
          echo "=========================================="
          echo " All models uploaded successfully!        "
          echo " HF Repo: https://huggingface.co/${{ env.HF_REPO_ID }}"
          echo "=========================================="
          echo ""
          echo "Usage:"
          echo "  huggingface-cli download ${{ env.HF_REPO_ID }} tiny.pt \\"
          echo "    --local-dir ~/.cache/whisper/"
          echo ""
          echo "  # 国内镜像"
          echo "  HF_ENDPOINT=https://hf-mirror.com huggingface-cli download \\"
          echo "    ${{ env.HF_REPO_ID }} tiny.pt --local-dir ~/.cache/whisper/"
