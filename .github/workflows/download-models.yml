name: Upload Whisper Models to Hugging Face

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 1 * *'

env:
  HF_REPO_ID: TheScenery/whisper-models

jobs:
  upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - tiny.en
          - tiny
          - base.en
          - base
          - small.en
          - small
          - medium.en
          - medium
          - large-v1
          - large-v2
          - large-v3
          - large-v3-turbo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install huggingface-hub

      - name: Download and upload ${{ matrix.model }}
        run: python scripts/upload_model.py ${{ matrix.model }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  summary:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install huggingface-hub
      - name: Upload model card
        run: python scripts/upload_readme.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ env.HF_REPO_ID }}
      - name: Print result
        run: |
          echo ""
          echo "=========================================="
          echo " All models uploaded successfully!        "
          echo " HF Repo: https://huggingface.co/${{ env.HF_REPO_ID }}"
          echo "=========================================="
          echo ""
          echo "Usage:"
          echo "  huggingface-cli download ${{ env.HF_REPO_ID }} tiny.pt \\"
          echo "    --local-dir ~/.cache/whisper/"
          echo ""
          echo "  # 国内镜像"
          echo "  HF_ENDPOINT=https://hf-mirror.com huggingface-cli download \\"
          echo "    ${{ env.HF_REPO_ID }} tiny.pt --local-dir ~/.cache/whisper/"
